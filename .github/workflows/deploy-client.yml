name: Deploy client

on:
  push:
    branches: [main]  # Deploy to staging
  release:
    types: [published]  # Deploy to production
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        type: choice
        options:
          - staging
          - production
        default: 'staging'

env:
  GODOT_VERSION: 4.6.2

jobs:
  deploy:
    runs-on: ubuntu-24.04

    container:
      image: barichello/godot-ci:4.6.2

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Determine environment
        id: env
        run: |
          if [ "${{ github.event_name }}" == "release" ]; then
            echo "environment=production" >> $GITHUB_OUTPUT
            echo "feature_flag=" >> $GITHUB_OUTPUT
            echo "itch_target=${{ secrets.ITCHIO_GAME }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" == "workflow_dispatch" ] && [ "${{ inputs.environment }}" == "production" ]; then
            echo "environment=production" >> $GITHUB_OUTPUT
            echo "feature_flag=" >> $GITHUB_OUTPUT
            echo "itch_target=${{ secrets.ITCHIO_GAME }}" >> $GITHUB_OUTPUT
          else
            echo "environment=staging" >> $GITHUB_OUTPUT
            echo "feature_flag=" >> $GITHUB_OUTPUT
            echo "itch_target=${{ secrets.ITCHIO_GAME }}-staging" >> $GITHUB_OUTPUT
          fi

      - name: Setup Godot export templates
        run: |
          mkdir -v -p ~/.local/share/godot/export_templates/
          mkdir -v -p ~/.config/
          if [ -d /root/.config/godot ]; then
            mv /root/.config/godot ~/.config/godot
          fi
          mv /root/.local/share/godot/export_templates/${GODOT_VERSION}.stable \
             ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable

      - name: Make build directory
        run: mkdir -p build/web

      - name: Export Web build
        run: |
          echo "Building for ${{ steps.env.outputs.environment }} environment"
          godot --headless --verbose ${{ steps.env.outputs.feature_flag }} --export-release "Web" "build/web/index.html"

      - name: Install butler
        run: |
          apt-get update && apt-get install -y wget unzip
          wget -O butler.zip https://broth.itch.zone/butler/linux-amd64/LATEST/archive/default
          unzip butler.zip
          chmod +x butler
          ./butler -V

      - name: Deploy to itch.io
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
        run: |
          echo "Deploying to ${{ secrets.ITCHIO_USERNAME }}/${{ steps.env.outputs.itch_target }}"
          ./butler push build/web ${{ secrets.ITCHIO_USERNAME }}/${{ steps.env.outputs.itch_target }}:html5
